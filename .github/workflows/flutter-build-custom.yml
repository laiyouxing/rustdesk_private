name: Build RustDesk Custom (Win64 + macOS + Ubuntu)

on:
  workflow_dispatch:
    inputs:
      upload-artifact:
        type: boolean
        default: true
        description: "Upload built artifacts"
      tag-name:
        type: string
        default: "custom-build"
        description: "Tag name for release (used for artifact naming)"

env:
  SCITER_RUST_VERSION: "1.75"
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  TAG_NAME: "${{ inputs.tag-name }}"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-RustDeskTempTopMostWindow:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      target: windows-2022
      configuration: Release
      platform: x64
      target_version: Windows10
    strategy:
      fail-fast: false

  # ═══════════════════ Windows x86_64 ══════════════════════════════════════
  build-windows:
    name: x86_64-pc-windows-msvc
    needs: [generate-bridge, build-RustDeskTempTopMostWindow]
    runs-on: windows-2022
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./
      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}
      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Replace engine with rustdesk custom flutter engine
        shell: bash
        run: |
          flutter doctor -v
          flutter precache --windows
          curl -LO https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip
          unzip -o windows-x64-release.zip -d windows-x64-release
          engine_path=$(find /c/hostedtoolcache -type d -name "windows-x64-release" -path "*/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/*" | head -1)
          if [ -n "$engine_path" ]; then
            cp -r windows-x64-release/* "$engine_path/"
          fi
      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "${{ env.FLUTTER_VERSION }}" == "3.24.5" ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false
      - name: Install vcpkg dependencies
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          if ! $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do echo "$_1:"; echo "======"; cat "$_1"; echo "======"; done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-windows-static-rel-out.log" || true
      - name: Download TopMostWindow artifacts
        if: ${{ inputs.upload-artifact }}
        uses: actions/download-artifact@master
        with:
          name: topmostwindow-artifacts
          path: "./rustdesk"
      - name: Build RustDesk
        shell: bash
        run: |
          python3 build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk
      - name: Upload artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@master
        with:
          name: rustdesk-unsigned-windows-x86_64
          path: rustdesk

  # ═══════════════════ macOS (x86_64 + aarch64) ═══════════════════════════
  build-macos:
    name: ${{ matrix.job.target }}
    needs: [generate-bridge]
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-apple-darwin,   os: macos-15-intel,  extra-build-args: "",                       arch: x86_64,  vcpkg-triplet: x64-osx }
          - { target: aarch64-apple-darwin,  os: macos-14,       extra-build-args: "--screencapturekit",    arch: aarch64, vcpkg-triplet: arm64-osx }
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./
      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: "rustfmt"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.job.os }}
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false
      - name: Install nasm
        run: brew install nasm
      - name: Install vcpkg dependencies
        run: |
          if ! $VCPKG_ROOT/vcpkg install --triplet ${{ matrix.job.vcpkg-triplet }} --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do echo "$_1:"; echo "======"; cat "$_1"; echo "======"; done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-${{ matrix.job.vcpkg-triplet }}-rel-out.log" || true
      - name: Show version
        shell: bash
        run: |
          clang --version || true
          rustup -V
          cargo -V
          rustc -V
      - name: Build RustDesk
        run: |
          if [ "${{ matrix.job.target }}" = "aarch64-apple-darwin" ]; then
            MIN_MACOS_VERSION="12.3"
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET\=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
            sed -i -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
            sed -i -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj
          fi
          ./build.py --flutter --hwcodec --unix-file-copy-paste ${{ matrix.job.extra-build-args }}
      - name: Create unsigned DMG
        if: ${{ inputs.upload-artifact }}
        run: |
          CREATE_DMG="$(command -v create-dmg)"
          CREATE_DMG="$(readlink -f "$CREATE_DMG")"
          sed -i -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG"
          create-dmg --icon "RustDesk.app" 200 190 --hide-extension "RustDesk.app" \
            --window-size 800 400 --app-drop-link 600 185 \
            rustdesk-${{ env.TAG_NAME }}-${{ matrix.job.arch }}.dmg \
            ./flutter/build/macos/Build/Products/Release/RustDesk.app
      - name: Upload unsigned macOS artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@master
        with:
          name: rustdesk-unsigned-macos-${{ matrix.job.arch }}
          path: rustdesk-${{ env.TAG_NAME }}-${{ matrix.job.arch }}.dmg

  # ═══════════════════ Ubuntu / Linux x86_64 ══════════════════════════════
  build-linux:
    name: build rustdesk linux x86_64
    needs: [generate-bridge]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Maximize build space
        run: |
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential clang cmake curl gcc git g++ \
            libayatana-appindicator3-dev libasound2-dev \
            libclang-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev libgtk-3-dev \
            libpam0g-dev libpulse-dev libva-dev \
            libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxdo-dev libxfixes-dev llvm-dev nasm \
            ninja-build pkg-config wget
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./
      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: "rustfmt"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: linux-x64
      - name: Disable rust bridge build
        run: |
          sed -i "s/\[\"cdylib\", \"staticlib\", \"rlib\"\]/\[\"cdylib\"\]/g" Cargo.toml
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false
      - name: Install vcpkg dependencies
        run: |
          if ! $VCPKG_ROOT/vcpkg install --triplet x64-linux --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do echo "$_1:"; echo "======"; cat "$_1"; echo "======"; done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-linux-rel-out.log" || true
      - name: Build RustDesk
        run: |
          ./build.py --flutter --hwcodec --unix-file-copy-paste
      - name: Build deb package
        if: ${{ inputs.upload-artifact }}
        run: |
          mkdir -p ./rustdesk-deb/usr/lib/rustdesk
          mkdir -p ./rustdesk-deb/usr/share/applications
          mkdir -p ./rustdesk-deb/usr/share/rustdesk/files
          cp -r ./flutter/build/linux/x64/release/bundle/* ./rustdesk-deb/usr/lib/rustdesk/
          cp ./res/rustdesk.desktop ./rustdesk-deb/usr/share/applications/
          dpkg-deb --build ./rustdesk-deb rustdesk-${{ env.TAG_NAME }}-amd64.deb
      - name: Upload Linux artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@master
        with:
          name: rustdesk-unsigned-linux-x86_64
          path: rustdesk-${{ env.TAG_NAME }}-amd64.deb

  # ═══════════════════ Publish Release ════════════════════════════════════
  publish-release:
    if: ${{ inputs.upload-artifact }}
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-22.04
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@master
        with:
          name: rustdesk-unsigned-windows-x86_64
          path: release/
      - name: Download macOS x86_64 artifacts
        uses: actions/download-artifact@master
        with:
          name: rustdesk-unsigned-macos-x86_64
          path: release/
      - name: Download macOS ARM artifacts
        uses: actions/download-artifact@master
        with:
          name: rustdesk-unsigned-macos-aarch64
          path: release/
      - name: Download Linux artifacts
        uses: actions/download-artifact@master
        with:
          name: rustdesk-unsigned-linux-x86_64
          path: release/
      - name: List release files
        run: ls -la release/
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          prerelease: true
          files: release/**
          fail_on_unmatched_files: false
          generate_release_notes: true
